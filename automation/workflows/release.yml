name: Build, Notarize & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: volt-production-release
  cancel-in-progress: false

env:
  APP_NAME: Volt
  PROJECT: Volt.xcodeproj
  SCHEME: Volt
  BUNDLE_ID: com.IronsideXXVI.Volt
  TEAM_ID: 69Y3X8R7D7
  SIGNING_IDENTITY: Developer ID Application

jobs:
  release:
    runs-on: depot-macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require the production branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Production releases may only run from the main branch"
            exit 1
          fi

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          fi
          xcodebuild -version
          python3 --version

      - name: Determine and reserve release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_SETTINGS=$(xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -showBuildSettings)
          BASE_VERSION=$(awk -F ' = ' '/MARKETING_VERSION/ { print $2; exit }' <<< "$BUILD_SETTINGS")

          if [[ ! "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::MARKETING_VERSION must contain at least two numeric components"
            exit 1
          fi

          VERSION_PREFIX=$(awk -F. '{ print $1 "." $2 }' <<< "$BASE_VERSION")
          APP_VERSION="${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}"
          BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          TAG="v${APP_VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists; refusing to overwrite a release"
            exit 1
          fi

          if gh api --silent "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" 2>/dev/null; then
            echo "::error::Release ${TAG} already exists; refusing to overwrite it"
            exit 1
          fi

          {
            echo "APP_VERSION=$APP_VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "TAG=$TAG"
          } >> "$GITHUB_ENV"

      - name: Verify release secrets
        env:
          DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          required=(
            DEVELOPER_ID_CERTIFICATE_P12
            DEVELOPER_ID_CERTIFICATE_PASSWORD
            APPLE_API_KEY_ID
            APPLE_API_ISSUER_ID
            APPLE_API_KEY_CONTENT
            SPARKLE_PRIVATE_KEY
          )

          for secret_name in "${required[@]}"; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Required Actions secret ${secret_name} is not configured"
              exit 1
            fi
          done

      - name: Validate configuration and core tests
        run: |
          plutil -lint Volt/Info.plist
          plutil -lint Volt/Volt.entitlements
          swift test -Xswiftc -warnings-as-errors

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          umask 077
          KEYCHAIN_PATH="$RUNNER_TEMP/volt-build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          EXISTING_KEYCHAINS=()
          while IFS= read -r keychain; do
            EXISTING_KEYCHAINS+=("$keychain")
          done < <(security list-keychains -d user | awk -F '"' 'NF >= 2 { print $2 }')
          security list-keychains -d user -s \
            "$KEYCHAIN_PATH" \
            "${EXISTING_KEYCHAINS[@]}"
          rm -f "$CERTIFICATE_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$TEAM_ID"; then
            echo "::error::The imported keychain does not contain the expected Developer ID identity"
            exit 1
          fi

      - name: Configure notarization key
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          umask 077
          mkdir -p "$HOME/private_keys"
          printf '%s' "$API_KEY_CONTENT" > "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/packages"

      - name: Archive unsigned app
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Volt.xcarchive" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/packages" \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-"

      - name: Sign app with Developer ID
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.app"
          ARCHIVED_APP="$RUNNER_TEMP/Volt.xcarchive/Products/Applications/$APP_NAME.app"
          ENTITLEMENTS_PATH="$RUNNER_TEMP/distribution-entitlements.plist"

          ditto "$ARCHIVED_APP" "$APP_PATH"
          rm -f "$APP_PATH/Contents/embedded.provisionprofile"
          xattr -cr "$APP_PATH"

          cat > "$ENTITLEMENTS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-only</key>
            <true/>
            <key>com.apple.security.temporary-exception.mach-lookup.global-name</key>
            <array>
              <string>${BUNDLE_ID}-spks</string>
              <string>${BUNDLE_ID}-spki</string>
            </array>
          </dict>
          </plist>
          EOF
          plutil -lint "$ENTITLEMENTS_PATH"

          SPARKLE_FRAMEWORK="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          SPARKLE_VERSION="$SPARKLE_FRAMEWORK/Versions/B"
          INSTALLER_XPC="$SPARKLE_VERSION/XPCServices/Installer.xpc"
          DOWNLOADER_XPC="$SPARKLE_VERSION/XPCServices/Downloader.xpc"
          AUTOUPDATE="$SPARKLE_VERSION/Autoupdate"
          UPDATER_APP="$SPARKLE_VERSION/Updater.app"

          for component in \
            "$INSTALLER_XPC" \
            "$DOWNLOADER_XPC" \
            "$AUTOUPDATE" \
            "$UPDATER_APP"; do
            if [ ! -e "$component" ]; then
              echo "::error::Expected Sparkle component is missing: $component"
              exit 1
            fi
          done

          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$INSTALLER_XPC"
          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --preserve-metadata=entitlements \
            "$DOWNLOADER_XPC"
          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$AUTOUPDATE"
          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$UPDATER_APP"
          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$SPARKLE_FRAMEWORK"
          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$ENTITLEMENTS_PATH" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize app
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.app"
          NOTARY_ZIP="$RUNNER_TEMP/Volt-app-notarization.zip"
          RESULT_FILE="$RUNNER_TEMP/app-notarization-result.json"

          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"
          SUBMIT_EXIT=0
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --output-format json > "$RESULT_FILE" || SUBMIT_EXIT=$?

          STATUS=$(jq -r '.status // empty' "$RESULT_FILE" 2>/dev/null || true)
          SUBMISSION_ID=$(jq -r '.id // empty' "$RESULT_FILE" 2>/dev/null || true)
          jq '{id, status, message}' "$RESULT_FILE" 2>/dev/null || cat "$RESULT_FILE"

          if [ "$SUBMIT_EXIT" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            echo "::error::App notarization was not accepted"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8" \
                --key-id "$API_KEY_ID" \
                --issuer "$API_ISSUER_ID" || true
            fi
            exit 1
          fi
          rm -f "$NOTARY_ZIP"

      - name: Staple and verify app
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.app"
          stapled=false
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "$APP_PATH"; then
              stapled=true
              break
            fi
            echo "Staple attempt ${attempt} failed; waiting 15 seconds for ticket propagation"
            sleep 15
          done

          if [ "$stapled" != true ]; then
            echo "::error::App stapling failed after five attempts"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Create and sign DMG
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.app"
          STAGING_DIR="$RUNNER_TEMP/dmg-staging"
          DMG_PATH="$RUNNER_TEMP/Volt-${APP_VERSION}.dmg"
          MOUNT_PATH="$RUNNER_TEMP/dmg-mount"

          rm -rf "$STAGING_DIR" "$MOUNT_PATH"
          mkdir -p "$STAGING_DIR" "$MOUNT_PATH"
          ditto "$APP_PATH" "$STAGING_DIR/$APP_NAME.app"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -format UDZO \
            -ov \
            "$DMG_PATH"

          cleanup_mount() {
            hdiutil detach "$MOUNT_PATH" -force 2>/dev/null || true
            rm -rf "$MOUNT_PATH"
          }
          trap cleanup_mount EXIT
          hdiutil attach "$DMG_PATH" \
            -mountpoint "$MOUNT_PATH" \
            -nobrowse \
            -readonly
          test -d "$MOUNT_PATH/$APP_NAME.app/Contents/MacOS"
          test -L "$MOUNT_PATH/Applications"
          test "$(readlink "$MOUNT_PATH/Applications")" = "/Applications"
          cleanup_mount
          trap - EXIT

          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          RESULT_FILE="$RUNNER_TEMP/dmg-notarization-result.json"
          SUBMIT_EXIT=0
          xcrun notarytool submit "$DMG_PATH" \
            --key "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --output-format json > "$RESULT_FILE" || SUBMIT_EXIT=$?

          STATUS=$(jq -r '.status // empty' "$RESULT_FILE" 2>/dev/null || true)
          SUBMISSION_ID=$(jq -r '.id // empty' "$RESULT_FILE" 2>/dev/null || true)
          jq '{id, status, message}' "$RESULT_FILE" 2>/dev/null || cat "$RESULT_FILE"

          if [ "$SUBMIT_EXIT" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization was not accepted"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8" \
                --key-id "$API_KEY_ID" \
                --issuer "$API_ISSUER_ID" || true
            fi
            exit 1
          fi

      - name: Staple and verify DMG
        run: |
          stapled=false
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "$DMG_PATH"; then
              stapled=true
              break
            fi
            echo "Staple attempt ${attempt} failed; waiting 15 seconds for ticket propagation"
            sleep 15
          done

          if [ "$stapled" != true ]; then
            echo "::error::DMG stapling failed after five attempts"
            exit 1
          fi

          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open \
            --context context:primary-signature \
            --verbose=4 \
            "$DMG_PATH"

      - name: Sign DMG for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          PRIVATE_KEY_PATH="$RUNNER_TEMP/sparkle-private-key"
          SIGN_UPDATE=$(find "$RUNNER_TEMP/packages" -path '*/bin/sign_update' -type f | sed -n '1p')

          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::Sparkle sign_update was not found in the resolved package"
            exit 1
          fi

          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          chmod +x "$SIGN_UPDATE"

          SIGNATURE_OUTPUT=$("$SIGN_UPDATE" "$DMG_PATH" --ed-key-file "$PRIVATE_KEY_PATH")
          ED_SIGNATURE=$(sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p' <<< "$SIGNATURE_OUTPUT")
          DMG_LENGTH=$(sed -n 's/.*length="\([0-9][0-9]*\)".*/\1/p' <<< "$SIGNATURE_OUTPUT")
          ACTUAL_LENGTH=$(stat -f%z "$DMG_PATH")

          if [ -z "$ED_SIGNATURE" ] || [[ ! "$DMG_LENGTH" =~ ^[0-9]+$ ]]; then
            echo "::error::Sparkle did not return both edSignature and length attributes"
            exit 1
          fi
          if [ "$DMG_LENGTH" != "$ACTUAL_LENGTH" ]; then
            echo "::error::Sparkle length does not match the final DMG size"
            exit 1
          fi

          {
            echo "ED_SIGNATURE=$ED_SIGNATURE"
            echo "DMG_LENGTH=$DMG_LENGTH"
          } >> "$GITHUB_ENV"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$GITHUB_SHA" \
            > "$RUNNER_TEMP/release-notes.json"
          jq -r '.body // ""' "$RUNNER_TEMP/release-notes.json" \
            > "$RUNNER_TEMP/release-notes.md"

          jq -n \
            --rawfile text "$RUNNER_TEMP/release-notes.md" \
            '{text: $text, mode: "gfm", context: env.GITHUB_REPOSITORY}' \
            | gh api --method POST markdown --input - \
            > "$RUNNER_TEMP/release-notes-fragment.html"

          cat > "$RUNNER_TEMP/release-notes.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Volt ${APP_VERSION} release notes</title>
            <style>
              body { color: #1f2328; font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0 auto; max-width: 760px; padding: 32px 24px; }
              a { color: #0969da; }
              code { background: #f6f8fa; border-radius: 4px; padding: 0.15em 0.35em; }
              pre { background: #f6f8fa; border-radius: 6px; overflow: auto; padding: 16px; }
              @media (prefers-color-scheme: dark) { body { background: #0d1117; color: #e6edf3; } a { color: #58a6ff; } code, pre { background: #161b22; } }
            </style>
          </head>
          <body>
          <h1>Volt ${APP_VERSION}</h1>
          EOF
          cat "$RUNNER_TEMP/release-notes-fragment.html" >> "$RUNNER_TEMP/release-notes.html"
          cat >> "$RUNNER_TEMP/release-notes.html" <<'EOF'
          </body>
          </html>
          EOF

      - name: Prepare appcast and release notes site
        run: |
          PAGES_DIR="$RUNNER_TEMP/gh-pages"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add --detach "$PAGES_DIR" origin/gh-pages
          else
            git worktree add --detach "$PAGES_DIR" "$GITHUB_SHA"
            (
              cd "$PAGES_DIR"
              git checkout --orphan gh-pages
              git rm -rf .
            )
          fi

          mkdir -p "$PAGES_DIR/releases"
          cp "$RUNNER_TEMP/release-notes.html" "$PAGES_DIR/releases/${APP_VERSION}.html"
          touch "$PAGES_DIR/.nojekyll"

          EXISTING_ARGS=()
          if [ -s "$PAGES_DIR/appcast.xml" ]; then
            EXISTING_ARGS=(--existing "$PAGES_DIR/appcast.xml")
          fi

          python3 automation/scripts/update_appcast.py \
            "${EXISTING_ARGS[@]}" \
            --output "$PAGES_DIR/appcast.xml" \
            --version "$BUILD_NUMBER" \
            --short-version "$APP_VERSION" \
            --minimum-system-version 14.0.0 \
            --release-notes-url "https://ironsidexxvi.github.io/Volt/releases/${APP_VERSION}.html" \
            --download-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Volt-${APP_VERSION}.dmg" \
            --length "$DMG_LENGTH" \
            --ed-signature "$ED_SIGNATURE" \
            --pub-date "$(date -u '+%a, %d %b %Y %H:%M:%S +0000')" \
            --limit 15
          xmllint --noout "$PAGES_DIR/appcast.xml"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            "$DMG_PATH#Volt ${APP_VERSION}" \
            --target "$GITHUB_SHA" \
            --title "Volt ${APP_VERSION}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Publish appcast and release notes
        run: |
          PAGES_DIR="$RUNNER_TEMP/gh-pages"
          cd "$PAGES_DIR"
          git add \
            .nojekyll \
            appcast.xml \
            "releases/${APP_VERSION}.html"

          if git diff --cached --quiet; then
            echo "No GitHub Pages changes to publish"
          else
            git commit -m "Publish Volt ${APP_VERSION} update feed"
            git push origin HEAD:gh-pages
          fi

      - name: Cleanup credentials
        if: always()
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          git worktree remove --force "$RUNNER_TEMP/gh-pages" 2>/dev/null || true
          security delete-keychain "$RUNNER_TEMP/volt-build.keychain-db" 2>/dev/null || true
          rm -f \
            "$RUNNER_TEMP/certificate.p12" \
            "$RUNNER_TEMP/distribution-entitlements.plist" \
            "$RUNNER_TEMP/sparkle-private-key" \
            "$RUNNER_TEMP/Volt-app-notarization.zip" \
            "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"
          rmdir "$HOME/private_keys" 2>/dev/null || true
