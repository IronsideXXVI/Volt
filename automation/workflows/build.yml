name: Build

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Validate configuration
        run: |
          plutil -lint Volt/Info.plist
          plutil -lint Volt/Volt.entitlements

      - name: Test provider normalization
        run: swift test -Xswiftc -warnings-as-errors

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Volt.xcodeproj \
            -scheme Volt \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/packages"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Volt.xcodeproj \
            -scheme Volt \
            -configuration Debug \
            -destination "generic/platform=macOS" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/packages" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
