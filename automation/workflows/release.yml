name: Build, Notarize & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  APP_NAME: Volt
  PROJECT: Volt.xcodeproj
  SCHEME: Volt
  BUNDLE_ID: com.IronsideXXVI.Volt
  TEAM_ID: 69Y3X8R7D7
  SIGNING_IDENTITY: Developer ID Application

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Determine release version
        run: |
          BASE_VERSION=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" -showBuildSettings \
            | awk -F ' = ' '/MARKETING_VERSION/ { print $2; exit }')
          VERSION_PREFIX=$(echo "$BASE_VERSION" | awk -F. '{ print $1 "." $2 }')
          APP_VERSION="${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "TAG=v$APP_VERSION" >> "$GITHUB_ENV"

      - name: Verify release secrets
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          for value in P12_BASE64 P12_PASSWORD API_KEY_ID API_ISSUER_ID API_KEY_CONTENT SPARKLE_PRIVATE_KEY; do
            if [ -z "${!value}" ]; then
              echo "::error::Required release secret $value is not configured"
              exit 1
            fi
          done

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/volt-build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Configure notarization key
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$API_KEY_CONTENT" > "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/packages"

      - name: Archive unsigned app
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Volt.xcarchive" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/packages" \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-"

      - name: Sign app with Developer ID
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.app"
          cp -R "$RUNNER_TEMP/Volt.xcarchive/Products/Applications/$APP_NAME.app" "$APP_PATH"
          rm -f "$APP_PATH/Contents/embedded.provisionprofile"
          xattr -cr "$APP_PATH"

          cat > "$RUNNER_TEMP/distribution-entitlements.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-only</key>
            <true/>
            <key>com.apple.security.temporary-exception.mach-lookup.global-name</key>
            <array>
              <string>${BUNDLE_ID}-spks</string>
              <string>${BUNDLE_ID}-spki</string>
            </array>
          </dict>
          </plist>
          EOF

          SPARKLE_FRAMEWORK="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          codesign --force --deep \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            "$SPARKLE_FRAMEWORK"

          codesign --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --options runtime \
            --entitlements "$RUNNER_TEMP/distribution-entitlements.plist" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize and staple app
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.app"
          NOTARY_ZIP="$RUNNER_TEMP/Volt-notarization.zip"
          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -v "$APP_PATH"

      - name: Package release
        run: |
          RELEASE_ZIP="$RUNNER_TEMP/Volt-${APP_VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/$APP_NAME.app" "$RELEASE_ZIP"
          echo "RELEASE_ZIP=$RELEASE_ZIP" >> "$GITHUB_ENV"
          echo "ARCHIVE_LENGTH=$(stat -f%z "$RELEASE_ZIP")" >> "$GITHUB_ENV"

      - name: Sign Sparkle archive
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=$(find "$RUNNER_TEMP/packages" -name sign_update -type f | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::Sparkle sign_update tool was not found"
            exit 1
          fi
          chmod +x "$SIGN_UPDATE"
          SIGNATURE=$("$SIGN_UPDATE" "$RELEASE_ZIP" --ed-key-file <(printf '%s' "$SPARKLE_PRIVATE_KEY"))
          ED_SIGNATURE=$(echo "$SIGNATURE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$ED_SIGNATURE" ]; then
            echo "::error::Sparkle did not produce an EdDSA signature"
            exit 1
          fi
          echo "ED_SIGNATURE=$ED_SIGNATURE" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            "$RELEASE_ZIP#Volt ${APP_VERSION}" \
            --target "$GITHUB_SHA" \
            --title "Volt ${APP_VERSION}" \
            --generate-notes

      - name: Build Sparkle appcast
        run: |
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Volt-${APP_VERSION}.zip"
          RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")
          cat > "$RUNNER_TEMP/appcast.xml" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Volt Updates</title>
              <link>https://ironsidexxvi.github.io/Volt/appcast.xml</link>
              <description>Volt release updates</description>
              <language>en</language>
              <item>
                <title>Volt ${APP_VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${APP_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <sparkle:releaseNotesLink>${RELEASE_NOTES_URL}</sparkle:releaseNotesLink>
                <enclosure url="${DOWNLOAD_URL}" length="${ARCHIVE_LENGTH}" type="application/octet-stream" sparkle:edSignature="${ED_SIGNATURE}" />
              </item>
            </channel>
          </rss>
          EOF
          xmllint --noout "$RUNNER_TEMP/appcast.xml"

      - name: Publish appcast to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          PAGES_DIR="$RUNNER_TEMP/gh-pages"
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add -B gh-pages "$PAGES_DIR" origin/gh-pages
          else
            git worktree add --detach "$PAGES_DIR"
            cd "$PAGES_DIR"
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          cp "$RUNNER_TEMP/appcast.xml" "$PAGES_DIR/appcast.xml"
          touch "$PAGES_DIR/.nojekyll"
          cd "$PAGES_DIR"
          git add appcast.xml .nojekyll
          git commit -m "Update appcast for ${TAG}" || exit 0
          git push origin HEAD:gh-pages

      - name: Cleanup credentials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/volt-build.keychain-db" 2>/dev/null || true
          rm -f "$HOME/private_keys"/AuthKey_*.p8
